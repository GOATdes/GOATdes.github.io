<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ssss-yagiのページ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; padding: 50px 20px; background-color: #f9f9f9; color: #333; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }

        .intro-box { 
            position: relative; 
            border: 2px solid #333; 
            padding: 40px 30px; 
            margin-bottom: 40px; 
            background: white; 
            box-sizing: border-box; 
            text-align: center;
        }

        .instagram-link {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #333;
            font-size: 1.5rem;
            text-decoration: none;
            transition: 0.2s;
        }
        .instagram-link:hover { color: #e1306c; }

        /* 自己紹介文のスタイル */
        .intro-text { line-height: 1.8; margin: 20px 0; }
        .intro-images { margin-top: 30px; }
        .intro-images img { 
            display: block; 
            margin: 0 auto 15px auto; 
            max-width: 100%; 
            height: auto; 
            border: 1px solid #ddd;
        }

        .manual-section { text-align: left; }
        .section-title { font-size: 1.5rem; border-left: 5px solid #333; padding-left: 15px; margin-bottom: 20px; font-weight: bold; }

        .article-card {
            display: block;
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 15px;
            text-decoration: none;
            color: inherit;
            border-radius: 8px;
            transition: 0.3s;
        }
        .article-card:hover { border-color: #333; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .article-title { display: block; font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .article-meta { font-size: 0.85rem; color: #777; }
    </style>
</head>
<body>

    <div class="container">
        <div class="intro-box">
            <a href="https://www.instagram.com/ssss_yagi" class="instagram-link" target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <h1>G.O.A.T</h1>
            
            <div class="intro-text">
                <p>26歳無職。<br>
                好きなもの：株、音ゲー、放浪。<br>
                嫌いなもの：労働、声がデカい人、満員電車。</p>
                
                <p>人生のセーフティネット作りや株のやり方など<br>
                持たざる者の生存戦略を書き残す。</p>
            </div>

            <div class="intro-images">
                <img src="ongeki.png" alt="オンゲキ画像">
                <img src="bandori.PNG" alt="バンドリ画像">
            </div>
        </div>

        <div class="manual-section">
            <div class="section-title">🛡️ 人生防衛マニュアル</div>
            <a href="manual/article1.html" class="article-card">
                <span class="article-title">第1回：まずは揃えたい基本の装備品</span>
                <span class="article-meta">2026.04.23 公開 | 防犯グッズ</span>
            </a>
            <div style="text-align: center; color: #999; padding: 20px;">
                Coming Soon... 次の記事を執筆中です。
            </div>
        </div>
    </div>

</body>
</html>
