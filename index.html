<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>G.O.A.T</title>
    
    <link rel="icon" href="icon.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f4f4; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .profile-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            max-width: 500px; 
            width: 90%; 
            text-align: center; 
        }

        .sns-links { 
            display: flex; 
            justify-content: flex-end; 
            gap: 15px; 
            margin-bottom: 20px; 
        }

        .sns-links a { 
            color: #333; 
            font-size: 1.2rem; 
            text-decoration: none; 
            transition: color 0.3s; 
        }

        /* ホバー時の色設定 */
        .sns-links a .fa-instagram:hover { color: #e4405f; }
        .sns-links a .fa-note-sticky:hover { color: #23bb77; }
        .sns-links a .fa-person-through-window:hover { color: #f1c40f; }
        
        h1 { font-size: 2rem; margin: 20px 0; letter-spacing: 2px; }
        .intro-text { line-height: 1.8; color: #555; margin-bottom: 30px; }
        
        .intro-images img { 
            width: 100%; 
            height: auto;
            border-radius: 4px; 
            margin-top: 10px; 
            border: 1px solid #eee;
            display: block;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="sns-links">
        <a href="https://www.instagram.com/ssss_yagi" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://note.com/GOATdes" target="_blank"><i class="fa-regular fa-note-sticky"></i></a>
        <a href="manual/article1.html" title="生存戦略メモ"><i class="fa-solid fa-person-through-window"></i></a>
    </div>

    <h1>G.O.A.T</h1>

    <div class="intro-text">
        <p>26歳無職。<br>
        好きなもの：株、音ゲー、音楽、放浪。<br>
        嫌いなもの：労働、満員電車。</p>
    </div>

    <div class="intro-images">
        <img src="ongeki.png" alt="オンゲキ">
        <img src="bandori.PNG" alt="バンドリ">
    </div>
</div>
