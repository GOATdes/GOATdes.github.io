<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.O.A.T</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f4f4; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        /* 自己紹介カード本体 */
        .profile-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            max-width: 500px; 
            width: 90%; 
            text-align: center; 
        }
        /* アイコンが並ぶヘッダー部分 */
        .sns-links { 
            display: flex; 
            justify-content: flex-end; 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .sns-links a { 
            color: #333; 
            font-size: 1.2rem; 
            text-decoration: none; 
            transition: opacity 0.2s;
        }
        .sns-links a:hover {
            opacity: 0.6;
        }
        
        h1 { font-size: 2rem; margin: 20px 0; letter-spacing: 2px; }
        .intro-text { line-height: 1.8; color: #555; margin-bottom: 30px; }
        
        /* オンゲキとバンドリの画像 */
        .intro-images img { 
            width: 100%; 
            border-radius: 4px; 
            margin-top: 10px; 
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="sns-links">
        <a href="https://jp.pinterest.com/ssss_yagi/" target="_blank"><i class="fa-brands fa-pinterest"></i></a>
        <a href="https://open.spotify.com/user/ssss_yagi" target="_blank"><i class="fa-brands fa-spotify"></i></a>
        <a href="https://www.instagram.com/ssss_yagi" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="manual/article1.html" title="人生防衛マニュアル"><i class="fa-solid fa-shield-halved"></i></a>
    </div>

    <h1>G.O.A.T</h1>

    <div class="intro-text">
        <p>26歳無職。<br>
        好きなもの：株、音ゲー、写真、音楽、放浪。<br>
        嫌いなもの：労働、声がデカい人、満員電車。</p>
        
        <p>人生のセーフティネット作りや株のやり方など<br>
        持たざる者の生存戦略を書き残す。</p>
    </div>

    <div class="intro-images">
        <img src="ongeki.png" alt="オンゲキ画像">
        <img src="bandori.PNG" alt="バンドリ画像">
    </div>
</div>

</body>
</html>
