<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ssss-yagiのページ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { text-align: center; font-family: "Helvetica Neue", Arial, sans-serif; padding: 50px; background-color: #f9f9f9; color: #333; }
        
        .intro-box { border: 2px solid #333; padding: 30px; margin: 0 auto 40px auto; max-width: 600px; background: white; box-sizing: border-box; }
        
        .links { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            flex-wrap: wrap; 
            max-width: 800px; 
            margin: 0 auto;
        }

        .link-item { 
            display: flex;
            align-items: center;    
            justify-content: center; 
            min-width: 120px;       
            height: 50px;           
            padding: 0 20px; 
            
            border: 1px solid #333; 
            text-decoration: none; 
            color: white; 
            background: #333; 
            border-radius: 5px; 
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s; 
        }
        
        .link-item i {
            font-size: 1.5rem;
        }
        
        .link-item:hover { background: #555; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="intro-box">
        <h1>自己紹介</h1>
        <p>ここにプロフィールやメッセージを書きます。</p>
    </div>

    <div class="links">
        <a href="https://www.instagram.com/ssss_yagi" class="link-item" target="_blank">
        <i class="fa-brands fa-instagram"></i></a>
        <a href="manual/" class="link-item">人生防衛マニュアル</a>
        <a href="#" class="link-item">リンク3</a>
        <a href="#" class="link-item">リンク4</a>
    </div>

</body>
</html>
