<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.O.A.T</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 外側のグレー背景と大きな枠線を復元 */
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f4f4; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        /* 以前の状態：外側のコンテナ枠 */
        .container {
            background-color: #f9f9f9;
            border: 1px solid #eee; /* 外側の線 */
            padding: 20px;
            border-radius: 15px;
        }

        /* 内側のプロフィールカード：これが以前の「線」があるカードです */
        .profile-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #ddd; /* カード自体の線 */
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            max-width: 500px; 
            width: 100%; 
            text-align: center; 
        }

        .sns-links { 
            display: flex; 
            justify-content: flex-end; 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .sns-links a { 
            color: #333; 
            font-size: 1.2rem; 
            text-decoration: none; 
        }
        
        h1 { font-size: 2rem; margin: 20px 0; letter-spacing: 2px; }
        .intro-text { line-height: 1.8; color: #555; margin-bottom: 30px; }
        
        .intro-images img { 
            width: 100%; 
            height: auto;
            border-radius: 4px; 
            margin-top: 10px; 
            border: 1px solid #eee;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <div class="sns-links">
            <a href="https://jp.pinterest.com/ssss_yagi/" target="_blank"><i class="fa-brands fa-pinterest"></i></a>
            <a href="https://open.spotify.com/user/..." target="_blank"><i class="fa-brands fa-spotify"></i></a>
            <a href="https://www.instagram.com/ssss_yagi" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="manual/article1.html"><i class="fa-solid fa-shield-halved"></i></a>
        </div>

        <h1>G.O.A.T</h1>

        <div class="intro-text">
            <p>26歳無職。<br>
            好きなもの：株、音ゲー、写真、音楽、放浪。<br>
            嫌いなもの：労働、声がデカい人、満員電車。</p>
            
            <p>人生のセーフティネット作りや株のやり方など<br>
            持たざる者の生存戦略を書き残す。</p>
        </div>

        <div class="intro-images">
            <img src="ongeki.png" alt="オンゲキ">
            <img src="bandori.PNG" alt="バンドリ">
        </div>
    </div>
</div>

</body>
</html>
